<header>
  <div>
    <div class="id" id="h-id"></div>
    <h1 id="h-title"></h1>
    <div class="summary" id="h-summary"></div>
  </div>
  <span class="badge" id="h-badge"></span>
  <div class="head-links">
    <a id="h-epic" href="#">Epic ↗</a>
    <a id="h-spec" href="#">Spec ↗</a>
    <a class="home" href="index.html">All diagrams</a>
  </div>
</header>
<div class="toolbar">
  <button id="btn-prev">‹ Prev</button>
  <button id="btn-next">Next ›</button>

  <button id="btn-reset">Reset</button>
  <span class="pos" id="pos"></span>
  <span class="legend">
    <span><span class="lk"></span>sync</span>
    <span><span class="lk async"></span>async</span>

</div>

  <div id="stage">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>

  </div>

    <button class="p-close" id="pclose" title="Close">×</button>
    <div id="panel-content"></div>
  </aside>
</main>

<script src="_diagram.js"></script>
<script>
const DIAGRAM = {
  id: "S-5",
  title: "Order & Invoice Query",
  status: "done",
  summary: "Read-only orders & invoices for My Page (Min side). List + detail, always scoped to the customer/company via RamBase $filter; cursor pagination with $top/$pageKey/$inlineCount. Quotes are excluded.",
  spec: "../superpowers/specs/2026-06-08-pretec-service-api-design.md",
  epic: "",
  actors: [
    {id:"user",    label:"B2B User",        sub:"Min side",            role:"client"},
    {id:"sf",      label:"Storefront",      sub:"Mosaik (Next.js)",    role:"store"},
    {id:"query",   label:"Query Service",   sub:"Pretec Service API",  role:"service"},
    {id:"mosaik",  label:"Mosaik Platform", sub:"user↔customer mapping",role:"service"},
    {id:"rambase", label:"RamBase",         sub:"Orders & invoices",   role:"erp"},
  ],
  steps: [
    {from:"user", to:"sf", kind:"sync", label:"Open Min side — orders/invoices",
     detail:"User opens My Page. Read-only surfacing of orders and invoices (RamBase chain: quote → order → shipping advice → invoice). Login required."},
    {from:"sf", to:"query", kind:"sync", label:"GET /orders — filters + page",
     detail:"Filters: date range, status, order number. Cursor pagination via $top / $pageKey, with $inlineCount=allpages for total count.",
     note:"Exact $filter field paths/operators to confirm during build (spec §8.3)."},
    {from:"query", to:"query", kind:"sync", label:"Validate Cognito ID token",
     detail:"ID token validated for identity (the authenticated subject)."},
    {from:"query", to:"mosaik", kind:"sync", label:"Resolve RamBase customer",
     detail:"GET /customers/current resolves the customer/company from the Mosaik mapping. Multiple users in the same company share the same orders/invoices view."},
    {from:"query", to:"rambase", kind:"sync", label:"List orders — $filter customer",
     detail:"Always scoped to the company via $filter on the resolved customer, using the single system credential. Cursor page returned via $pageKey.",
     provisional:true,
     note:"Sales Invoice (CIN) resource + credit notes behind the credentialed portal (spec §8.3)."},
    {from:"rambase", to:"query", kind:"return", label:"order/invoice page + count"},
    {frag:"alt", label:"empty result"},
      {from:"query", to:"sf", kind:"return", label:"Empty list state",
       detail:"No orders/invoices for the customer in the given filter — a clean empty state is returned."},
    {frag:"else", label:"results present"},
      {from:"query", to:"sf", kind:"return", label:"List + pagination cursor",
       detail:"List view returned with the next-page cursor and total count."},
    {frag:"end"},
    {from:"user", to:"sf", kind:"sync", label:"Open a document detail",
     detail:"User opens an order or invoice detail."},
    {from:"query", to:"rambase", kind:"sync", label:"Get document detail + items",
     detail:"Detail and line items fetched, still scoped to the customer.",
     provisional:true},
    {from:"query", to:"sf", kind:"return", label:"Document detail",
     detail:"Data shown on screen. PDF retrieval (order confirmation / invoice) is unconfirmed — data-only if PDFs are not exposed by RamBase.",
     provisional:true,
     note:"No public REST endpoint for PDFs found; RamBase uses Document-Messages + PEPPOL (spec §8.4)."},
    {from:"sf", to:"user", kind:"return", label:"Orders & invoices view",
     detail:"The list and document views are rendered in Min side."},
  ],
};
renderSequence(DIAGRAM);
</script>
</body>
</html>
