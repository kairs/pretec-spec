<title>Pretec — Produktkatalog</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1D2B3A;--navy2:#253545;--dust:#EDEAE3;--white:#fff;
  --border:#CCC7BB;--text:#1D2B3A;--mid:#455060;--muted:#78838F;
  --c1:#688059;--c2:#3D6EA0;--c3:#8A5E38;--c4:#A88C1A;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--dust);color:var(--text);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
.shell{display:flex;flex-direction:column;height:100vh}

/* Header */
.hdr{flex-shrink:0;height:48px;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:0;border-bottom:1px solid rgba(0,0,0,.2);z-index:20}
.hdr-logo{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.92)}
.hdr-sep{width:1px;height:16px;background:rgba(255,255,255,.14);margin:0 16px}
.hdr-title{font-size:12.5px;color:rgba(255,255,255,.42)}
.hdr-right{margin-left:auto;position:relative}
.hdr-right svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(255,255,255,.28)}
.search-inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:2px;color:#fff;padding:6px 10px 6px 29px;font-size:12.5px;font-family:inherit;width:230px;outline:none;transition:background .15s,border-color .15s}
.search-inp::placeholder{color:rgba(255,255,255,.26)}
.search-inp:focus{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.2)}

/* Body */
.body{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:210px;flex-shrink:0;background:var(--navy);border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:24px}
.sb-label{padding:18px 16px 8px;font-size:9.5px;text-transform:uppercase;letter-spacing:.13em;font-weight:700;color:rgba(255,255,255,.17)}
.cat-btn{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;width:100%;text-align:left;background:none;border:none;border-left:3px solid transparent;cursor:pointer;color:rgba(255,255,255,.42);font-family:inherit;transition:color .13s,background .13s,border-color .13s}
.cat-btn:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.04)}
.cat-btn.active{color:#fff;background:rgba(255,255,255,.07)}
.cat-btn.active[data-id=prefab]{border-left-color:var(--c1)}
.cat-btn.active[data-id=stal]{border-left-color:var(--c2)}
.cat-btn.active[data-id=tunnel]{border-left-color:var(--c3)}
.cat-btn.active[data-id=veilys]{border-left-color:var(--c4)}
.cat-swatch{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;opacity:.35;transition:opacity .13s}
.cat-btn.active .cat-swatch{opacity:1}
.cat-txt{display:flex;flex-direction:column;gap:2px}
.cat-name{font-size:12.5px;font-weight:500;line-height:1.35}
.cat-sub{font-size:10.5px;color:rgba(255,255,255,.22);transition:color .13s}
.cat-btn.active .cat-sub{color:rgba(255,255,255,.38)}

/* Tree */
.tree-list{margin:0;padding:0}
.tree-node{border-bottom:1px solid rgba(255,255,255,.04)}
.tree-node:last-child{border-bottom:none}
.tree-row{display:flex;align-items:center;cursor:pointer;min-height:32px;border-left:2px solid transparent;transition:background .09s}
.tree-row.has-ch{cursor:pointer}
.tree-row.leaf-row{cursor:pointer}
.tree-row:hover{background:rgba(255,255,255,.04)}
.tree-row.active-leaf{background:rgba(255,255,255,.1);color:#fff}
.tree-row-inner{display:flex;align-items:center;gap:6px;padding:6px 14px;flex:1}
.tree-tog{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.18);font-size:11px;font-weight:700;color:rgba(255,255,255,.35);border-radius:1px;transition:border-color .1s,color .1s;line-height:1}
.tree-row:hover .tree-tog{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.65)}
.tree-sp{width:14px;flex-shrink:0}
.tree-lbl{font-size:12px;color:rgba(255,255,255,.55);flex:1;line-height:1.3}
.tree-row.active-leaf .tree-lbl{color:#fff;font-weight:500}
.d0>.tree-row .tree-lbl{font-weight:600;font-size:12.5px;color:rgba(255,255,255,.75)}
.d1>.tree-row .tree-row-inner{padding-left:28px}
.d2>.tree-row .tree-row-inner{padding-left:42px}
.d3>.tree-row .tree-row-inner{padding-left:56px}
.tree-ch{display:grid;grid-template-rows:0fr;transition:grid-template-rows .2s ease}
.tree-ch.open{grid-template-rows:1fr}
.tree-ch-inner{overflow:hidden;min-height:0}

/* Main */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.crumb{flex-shrink:0;padding:12px 24px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:var(--dust);position:sticky;top:0;z-index:10}
.crumb-seg{display:flex;align-items:center;gap:6px}
.crumb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.crumb-item{font-size:12px;color:var(--muted);cursor:pointer;transition:color .1s}
.crumb-item:hover{color:var(--text)}
.crumb-item.last{color:var(--text);font-weight:500;cursor:default}
.crumb-sep{font-size:11px;color:var(--border)}
.content{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* Category cards */
.cat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.cat-card{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px}
.cat-card:hover{border-color:#AAA4999;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.cat-card-name{font-size:13px;font-weight:600;color:var(--text)}
.cat-card-count{font-size:11px;color:var(--muted)}
.cat-card-bar{height:3px;border-radius:1px;margin-top:4px}

/* Section heading */
.section-hd{display:flex;align-items:center;justify-content:space-between}
.section-hd-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.section-hd-count{font-size:11.5px;color:var(--muted);font-weight:400}

/* Product grid */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.prod-card{background:var(--white);border:1px solid var(--border);border-radius:2px;cursor:pointer;overflow:hidden;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column}
.prod-card:hover{border-color:#9A9590;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.prod-card-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:#F5F3EF}
.prod-card-img canvas{width:100%;height:100%;display:block}
.prod-card-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.prod-art{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;font-variant-numeric:tabular-nums}
.prod-name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3}
.prod-specs{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.spec-pill{font-size:10.5px;background:#F0EDE7;color:var(--mid);padding:2px 7px;border-radius:1px;white-space:nowrap}
.example-badge{font-size:9.5px;color:rgba(0,0,0,.3);margin-top:auto;padding-top:6px;letter-spacing:.04em}

/* Product detail */
.detail{position:fixed;right:0;top:48px;bottom:0;width:400px;background:var(--white);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;z-index:15;display:flex;flex-direction:column}
.detail.open{transform:translateX(0)}
.detail-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--white);z-index:1}
.detail-close{background:none;border:1px solid var(--border);border-radius:2px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:background .1s,color .1s}
.detail-close:hover{background:var(--dust);color:var(--text)}
.detail-art{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase}
.detail-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:#F5F3EF;flex-shrink:0}
.detail-img canvas{width:100%;height:100%;display:block}
.detail-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.detail-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.detail-family{font-size:12px;color:var(--muted);margin-top:2px}
.spec-table{width:100%;border-collapse:collapse}
.spec-table td{padding:6px 0;font-size:12.5px;border-bottom:1px solid var(--border);vertical-align:top}
.spec-table td:first-child{color:var(--muted);width:45%;padding-right:12px}
.spec-table td:last-child{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
.spec-table tr:last-child td{border-bottom:none}
.detail-tag{font-size:9.5px;background:#F0EDE7;color:var(--mid);padding:2px 8px;border-radius:1px;display:inline-block}
.detail-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border)}
</style>

<div class="body">

  <div class="detail-body" id="d-body"></div>
</aside>
</div>

/* ── CANVAS DRAWING ── */
function ha(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')'}

function makeImg(type,color){
  var W=280,H=210,c=document.createElement('canvas');
  c.width=W;c.height=H;
  var ctx=c.getContext('2d');
  // bg
  var gd=ctx.createLinearGradient(0,0,W,H);
  gd.addColorStop(0,'#F6F4EF');gd.addColorStop(1,'#EDEAE3');
  ctx.fillStyle=gd;ctx.fillRect(0,0,W,H);
  // subtle grid
  ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
  for(var x=0;x<=W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=0;y<=H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  var fn={bolt:drawBolt,rod:drawRod,mast:drawMast,drill:drawDrill,plate:drawPlate,sleeve:drawSleeve,mesh:drawMesh,bracket:drawBracket,wedge:drawWedge,cartridge:drawCartridge,tool:drawTool}[type]||drawBolt;
  fn(ctx,W,H,color);
  return c;
}

function drawBolt(ctx,W,H,col){
  var cx=W/2,ty=H*0.3;
  ctx.save();ctx.translate(cx,ty);
  ctx.fillStyle=ha(col,0.18);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;
  ctx.beginPath();
  for(var i=0;i<6;i++){var a=i*Math.PI/3-Math.PI/6;ctx.lineTo(28*Math.cos(a),14*Math.sin(a))}
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
  var sx=cx-8,sy=H*0.3+15,sw=16,sh=H*0.42;
  ctx.fillStyle='#D8D4CE';ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;
  ctx.fillRect(sx,sy,sw,sh);ctx.strokeRect(sx,sy,sw,sh);
  ctx.strokeStyle=ha(col,0.55);ctx.lineWidth=1;
  for(var yi=4;yi<sh;yi+=6){ctx.beginPath();ctx.moveTo(sx-3,sy+yi);ctx.lineTo(sx+sw+3,sy+yi);ctx.stroke()}
  ctx.fillStyle=ha(col,0.5);ctx.fillRect(sx-7,sy+sh-18,sw+14,14);
  ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;ctx.strokeRect(sx-7,sy+sh-18,sw+14,14);
}

function drawRod(ctx,W,H,col){
  var cx=W/2,rW=14,rH=H*0.72,ry=(H-rH)/2;
  ctx.fillStyle='#DEDAD3';ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;
  ctx.fillRect(cx-rW/2,ry,rW,rH);ctx.strokeRect(cx-rW/2,ry,rW,rH);
  ctx.strokeStyle=ha(col,0.45);ctx.lineWidth=1;
  for(var y=4;y<rH;y+=7){ctx.beginPath();ctx.moveTo(cx-rW/2-3,ry+y);ctx.lineTo(cx+rW/2+3,ry+y);ctx.stroke()}
  ctx.fillStyle=ha(col,0.6);
  [[cx-rW/2-4,ry,rW+8,10],[cx-rW/2-4,ry+rH-10,rW+8,10]].forEach(function(r){ctx.fillRect(r[0],r[1],r[2],r[3])});
  ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;
  ctx.strokeRect(cx-rW/2-4,ry,rW+8,10);ctx.strokeRect(cx-rW/2-4,ry+rH-10,rW+8,10);
}

function drawMast(ctx,W,H,col){
  var cx=W/2;
  var bW=60,bH=12,bY=H*0.82;
  ctx.fillStyle=ha(col,0.25);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;
  ctx.fillRect(cx-bW/2,bY,bW,bH);ctx.strokeRect(cx-bW/2,bY,bW,bH);
  [cx-20,cx-8,cx+8,cx+20].forEach(function(bx){
    ctx.beginPath();ctx.moveTo(bx,bY);ctx.lineTo(bx,bY+bH+8);ctx.stroke();
    ctx.beginPath();ctx.arc(bx,bY+bH+9,3,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  var mW=10,mH=H*0.68,mY=bY-mH;
  var grad=ctx.createLinearGradient(cx-mW/2,0,cx+mW/2,0);
  grad.addColorStop(0,'#C8C4BC');grad.addColorStop(0.4,'#E8E4DE');grad.addColorStop(1,'#C0BDB5');
  ctx.fillStyle=grad;ctx.fillRect(cx-mW/2,mY,mW,mH);ctx.strokeRect(cx-mW/2,mY,mW,mH);
  ctx.fillStyle=ha(col,0.6);ctx.fillRect(cx-mW/2-3,mY,mW+6,14);
  ctx.strokeStyle='#3A4550';ctx.strokeRect(cx-mW/2-3,mY,mW+6,14);
}

function drawDrill(ctx,W,H,col){
  var cx=W/2,dW=10,dH=H*0.55,dY=H*0.12;
  ctx.fillStyle=ha(col,0.3);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;
  ctx.fillRect(cx-7,dY,14,18);ctx.strokeRect(cx-7,dY,14,18);
  ctx.fillStyle='#DEDAD3';ctx.fillRect(cx-dW/2,dY+18,dW,dH-18);ctx.strokeRect(cx-dW/2,dY+18,dW,dH-18);
  ctx.strokeStyle=ha(col,0.4);ctx.lineWidth=1;
  for(var y=0;y<dH-22;y+=9){
    ctx.beginPath();ctx.moveTo(cx-dW/2-2,dY+20+y);ctx.lineTo(cx+dW/2,dY+20+y+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-dW/2,dY+20+y+4);ctx.lineTo(cx+dW/2+2,dY+20+y);ctx.stroke();
  }
  var tipY=dY+dH;
  ctx.fillStyle='#7A7570';ctx.beginPath();ctx.moveTo(cx-dW/2,tipY);ctx.lineTo(cx,tipY+H*0.14);ctx.lineTo(cx+dW/2,tipY);ctx.closePath();ctx.fill();ctx.stroke();
}

function drawPlate(ctx,W,H,col){
  var pw=W*0.62,ph=H*0.38,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=ha(col,0.15);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;
  ctx.fillRect(px,py,pw,ph);ctx.strokeRect(px,py,pw,ph);
  var holes=[[px+14,py+14],[px+pw-14,py+14],[px+14,py+ph-14],[px+pw-14,py+ph-14],[px+pw/2,py+ph/2]];
  holes.forEach(function(h){
    ctx.fillStyle='#F0EDE7';ctx.beginPath();ctx.arc(h[0],h[1],7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(h[0],h[1],7,0,Math.PI*2);ctx.stroke();
  });
}

function drawSleeve(ctx,W,H,col){
  var cx=W/2,cy=H/2,r=34,ir=20,sH=H*0.55;
  ctx.fillStyle='#DEDAD3';ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;
  ctx.fillRect(cx-r,cy-sH/2,r*2,sH);ctx.strokeRect(cx-r,cy-sH/2,r*2,sH);
  ctx.fillStyle='#F0EDE7';ctx.fillRect(cx-ir,cy-sH/2-1,ir*2,sH+2);ctx.strokeRect(cx-ir,cy-sH/2,ir*2,sH);
  ctx.strokeStyle=ha(col,0.5);ctx.lineWidth=1;
  for(var y=8;y<sH;y+=8){ctx.beginPath();ctx.moveTo(cx-r-3,cy-sH/2+y);ctx.lineTo(cx-ir,cy-sH/2+y);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+ir,cy-sH/2+y);ctx.lineTo(cx+r+3,cy-sH/2+y);ctx.stroke()}
  ctx.fillStyle=ha(col,0.4);ctx.fillRect(cx-r-2,cy-sH/2,r*2+4,12);ctx.fillRect(cx-r-2,cy+sH/2-12,r*2+4,12);
  ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;ctx.strokeRect(cx-r-2,cy-sH/2,r*2+4,12);ctx.strokeRect(cx-r-2,cy+sH/2-12,r*2+4,12);
}

function drawMesh(ctx,W,H,col){
  var mx=W*0.15,my=H*0.18,mw=W*0.7,mh=H*0.64;
  ctx.fillStyle=ha(col,0.08);ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;ctx.strokeRect(mx,my,mw,mh);
  ctx.strokeStyle=ha(col,0.65);ctx.lineWidth=1.5;
  var cols=6,rows=5;
  for(var c=0;c<=cols;c++){var xi=mx+c*(mw/cols);ctx.beginPath();ctx.moveTo(xi,my);ctx.lineTo(xi,my+mh);ctx.stroke()}
  for(var r=0;r<=rows;r++){var yi=my+r*(mh/rows);ctx.beginPath();ctx.moveTo(mx,yi);ctx.lineTo(mx+mw,yi);ctx.stroke()}
  ctx.fillStyle=ha(col,0.7);
  for(var ci=0;ci<=cols;ci++)for(var ri=0;ri<=rows;ri++){
    var xi2=mx+ci*(mw/cols),yi2=my+ri*(mh/rows);
    ctx.beginPath();ctx.arc(xi2,yi2,3,0,Math.PI*2);ctx.fill();
  }
}

function drawBracket(ctx,W,H,col){
  var cx=W/2,cy=H/2;
  ctx.strokeStyle='#3A4550';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.fillStyle=ha(col,0.2);
  ctx.beginPath();ctx.moveTo(cx-50,cy-40);ctx.lineTo(cx+50,cy-40);ctx.lineTo(cx+50,cy+40);ctx.lineTo(cx-50,cy+40);ctx.closePath();
  // L shape instead
  ctx.clearRect(0,0,999,999);
  var gd2=ctx.createLinearGradient(0,0,W,H);gd2.addColorStop(0,'#F6F4EF');gd2.addColorStop(1,'#EDEAE3');ctx.fillStyle=gd2;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
  for(var xi=0;xi<=W;xi+=20){ctx.beginPath();ctx.moveTo(xi,0);ctx.lineTo(xi,H);ctx.stroke()}
  for(var yi=0;yi<=H;yi+=20){ctx.beginPath();ctx.moveTo(0,yi);ctx.lineTo(W,yi);ctx.stroke()}
  var bx=cx-45,by=cy-50,bw=90,bh=18;
  ctx.fillStyle=ha(col,0.2);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;
  ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);
  var bx2=cx-45,by2=by+bh,bw2=18,bh2=80;
  ctx.fillRect(bx2,by2,bw2,bh2);ctx.strokeRect(bx2,by2,bw2,bh2);
  [cx-30,cx,cx+30].forEach(function(hx){ctx.beginPath();ctx.arc(hx,by+bh/2,5,0,Math.PI*2);ctx.fillStyle='#F0EDE7';ctx.fill();ctx.strokeStyle='#3A4550';ctx.stroke()});
  [by2+20,by2+50].forEach(function(hy){ctx.beginPath();ctx.arc(bx2+bw2/2,hy,5,0,Math.PI*2);ctx.fillStyle='#F0EDE7';ctx.fill();ctx.strokeStyle='#3A4550';ctx.stroke()});
}

function drawWedge(ctx,W,H,col){
  var cx=W/2,cy=H/2;
  ctx.fillStyle=ha(col,0.2);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(cx-12,cy-55);ctx.lineTo(cx+12,cy-55);ctx.lineTo(cx+20,cy+30);ctx.lineTo(cx-20,cy+30);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#DEDAD3';ctx.strokeStyle='#3A4550';
  ctx.beginPath();ctx.moveTo(cx-20,cy+30);ctx.lineTo(cx+20,cy+30);ctx.lineTo(cx+28,cy+55);ctx.lineTo(cx-28,cy+55);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle=ha(col,0.5);ctx.lineWidth=1;
  [[cx-10,cy+30],[cx,cy+30],[cx+10,cy+30]].forEach(function(pt){ctx.beginPath();ctx.moveTo(pt[0],pt[1]);ctx.lineTo(pt[0]+(pt[0]-cx)*0.5,cy+55);ctx.stroke()});
  ctx.strokeStyle='#3A4550';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,cy-55);ctx.lineTo(cx,cy-70);ctx.stroke();
  ctx.fillStyle=ha(col,0.6);ctx.beginPath();ctx.arc(cx,cy-70,5,0,Math.PI*2);ctx.fill();ctx.stroke();
}

function drawCartridge(ctx,W,H,col){
  var cx=W/2,cw=32,ch=H*0.58,cy=(H-ch)/2+10;
  ctx.fillStyle='#DEDAD3';ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;
  ctx.fillRect(cx-cw/2,cy,cw,ch);ctx.strokeRect(cx-cw/2,cy,cw,ch);
  ctx.fillStyle=ha(col,0.6);ctx.fillRect(cx-cw/2,cy,cw,ch*0.25);
  ctx.strokeStyle='#3A4550';ctx.strokeRect(cx-cw/2,cy,cw,ch*0.25);
  ctx.fillStyle='#BFBBB4';ctx.fillRect(cx-8,cy-18,16,18);ctx.strokeRect(cx-8,cy-18,16,18);
  ctx.fillStyle='#AEAAA4';ctx.fillRect(cx-4,cy-24,8,6);ctx.strokeRect(cx-4,cy-24,8,6);
  ctx.strokeStyle=ha(col,0.3);ctx.lineWidth=1;
  for(var y=ch*0.3;y<ch-4;y+=12){ctx.beginPath();ctx.moveTo(cx-cw/2+4,cy+y);ctx.lineTo(cx+cw/2-4,cy+y);ctx.stroke()}
}

function drawTool(ctx,W,H,col){
  ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-0.4);
  var ow=14,oh=30,bw=55,bh=14;
  ctx.fillStyle='#DEDAD3';ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;
  ctx.fillRect(-bw*0.7,-(bh/2),bw*1.4,bh);ctx.strokeRect(-bw*0.7,-(bh/2),bw*1.4,bh);
  ctx.fillStyle=ha(col,0.3);
  [[-bw*0.7-ow/2,-(oh/2),ow,oh],[bw*0.7-ow/2,-(oh/2),ow,oh]].forEach(function(r){ctx.fillRect(r[0],r[1],r[2],r[3]);ctx.strokeStyle='#3A4550';ctx.lineWidth=1.8;ctx.strokeRect(r[0],r[1],r[2],r[3])});
  ctx.fillStyle='#F0EDE7';
  [[-bw*0.7+ow/4,-(oh*0.25)],[bw*0.7+ow/4,-(oh*0.25)]].forEach(function(h){ctx.beginPath();ctx.arc(h[0],h[1],7,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#3A4550';ctx.lineWidth=1.5;ctx.stroke()});
  ctx.restore();
}

/* ── STATE & NAV ── */
var activeSegId = null;
var navPath = []; // array of node objects from root to current
var selectedProduct = null;
var imgCache = {};

function segColor(){return activeSegId?SEGS.find(function(s){return s.id===activeSegId}).color:'#888'}

function getImg(type,color){
  var k=type+'|'+color;
  if(!imgCache[k]){var c=makeImg(type,color);imgCache[k]=c}
  return imgCache[k];
}

function countLeafProducts(node){
  if(node.products)return node.products.length;
  if(!node.children)return 0;
  return node.children.reduce(function(s,c){return s+countLeafProducts(c)},0);
}

/* ── SIDEBAR ── */
function renderSidebar(){
  var el=document.getElementById('sidebar');
  el.innerHTML='<div class="sb-label">Segmenter</div>';
  SEGS.forEach(function(seg){
    var btn=document.createElement('button');
    btn.className='cat-btn'+(seg.id===activeSegId?' active':'');
    btn.dataset.id=seg.id;
    btn.innerHTML='<span class="cat-swatch" style="background:'+seg.color+'"></span><span class="cat-txt"><span class="cat-name">'+seg.label+'</span><span class="cat-sub">'+countLeafProducts(seg)+' produkter</span></span>';
    btn.onclick=function(){
      activeSegId=seg.id;
      navPath=[seg];
      selectedProduct=null;
      document.getElementById('detail').classList.remove('open');
      renderSidebar();renderContent();
    };
    el.appendChild(btn);
  });
}

/* ── BREADCRUMB ── */
function renderCrumb(){
  var el=document.getElementById('crumb');
  el.innerHTML='';
  if(!activeSegId){el.innerHTML='<span style="color:var(--muted);font-size:12px">Velg et segment fra menyen</span>';return}
  var seg=SEGS.find(function(s){return s.id===activeSegId});
  var dot=document.createElement('span');dot.className='crumb-dot';dot.style.background=seg.color;
  el.appendChild(dot);
  navPath.forEach(function(node,i){
    var item=document.createElement('span');
    item.className='crumb-item'+(i===navPath.length-1?' last':'');
    item.textContent=node.label;
    if(i<navPath.length-1){
      item.onclick=function(){navPath=navPath.slice(0,i+1);selectedProduct=null;document.getElementById('detail').classList.remove('open');renderContent()};
    }
    el.appendChild(item);
    if(i<navPath.length-1){var sep=document.createElement('span');sep.className='crumb-sep';sep.textContent='›';el.appendChild(sep)}
  });
}

/* ── CONTENT ── */
function renderContent(){
  renderCrumb();
  var el=document.getElementById('content');
  el.innerHTML='';
  if(!activeSegId)return;
  var cur=navPath[navPath.length-1];
  if(cur.products){
    renderProductGrid(cur,el);
  } else if(cur.children){
    renderCategoryCards(cur,el);
  }
}

function renderCategoryCards(node,el){
  var hd=document.createElement('div');hd.className='section-hd';
  hd.innerHTML='<div class="section-hd-title">'+node.label+'<span class="section-hd-count">'+node.children.length+' kategorier</span></div>';
  el.appendChild(hd);
  var grid=document.createElement('div');grid.className='cat-cards';
  var color=segColor();
  node.children.forEach(function(child){
    var card=document.createElement('div');card.className='cat-card';
    var cnt=countLeafProducts(child);
    card.innerHTML='<div class="cat-card-name">'+child.label+'</div><div class="cat-card-count">'+cnt+' produkt'+(cnt===1?'':'er')+'</div><div class="cat-card-bar" style="background:'+color+'44"></div>';
    card.onclick=function(){navPath.push(child);renderContent()};
    grid.appendChild(card);
  });
  el.appendChild(grid);
}

function renderProductGrid(node,el){
  var hd=document.createElement('div');hd.className='section-hd';
  hd.innerHTML='<div class="section-hd-title">'+node.label+'<span class="section-hd-count">'+node.products.length+' produkter</span></div>';
  el.appendChild(hd);
  var grid=document.createElement('div');grid.className='prod-grid';
  var color=segColor();
  node.products.forEach(function(p){
    var card=document.createElement('div');card.className='prod-card';
    var imgDiv=document.createElement('div');imgDiv.className='prod-card-img';
    var canvas=getImg(node.img||'bolt',color);
    var clone=document.createElement('canvas');clone.width=canvas.width;clone.height=canvas.height;
    clone.getContext('2d').drawImage(canvas,0,0);
    imgDiv.appendChild(clone);
    var specKeys=Object.keys(p.specs||{}).slice(0,3);
    var pills=specKeys.map(function(k){return'<span class="spec-pill">'+p.specs[k]+'</span>'}).join('');
    var body=document.createElement('div');body.className='prod-card-body';
    body.innerHTML='<div class="prod-art">'+p.id+'</div><div class="prod-name">'+p.name+'</div><div class="prod-specs">'+pills+'</div>';
    card.appendChild(imgDiv);card.appendChild(body);
    card.onclick=function(){openDetail(p,node.img||'bolt',color)};
    grid.appendChild(card);
  });
  el.appendChild(grid);
}

/* ── PRODUCT DETAIL ── */
function openDetail(p,imgType,color){
  selectedProduct=p;
  document.getElementById('d-art').textContent=p.id;
  var dc=document.getElementById('d-canvas');
  dc.width=400;dc.height=300;
  var src=getImg(imgType,color);
  dc.getContext('2d').drawImage(src,0,0,400,300);
  var body=document.getElementById('d-body');
  var specs=p.specs||{};
  var rows=Object.keys(specs).map(function(k){return'<tr><td>'+k+'</td><td>'+specs[k]+'</td></tr>'}).join('');
  var extra='';
  if(p.nameEN)extra+='<tr><td>Engelsk navn</td><td>'+p.nameEN+'</td></tr>';
  if(p.unit)extra+='<tr><td>Enhet</td><td>'+p.unit+'</td></tr>';
  if(p.vismaId)extra+='<tr><td>Visma ID</td><td>'+p.vismaId+'</td></tr>';
  if(p.family)extra+='<tr><td>Produktfamilie</td><td>'+p.family+'</td></tr>';
  body.innerHTML='<div><div class="detail-name">'+p.name+'</div>'+(p.family?'<div class="detail-family">'+p.family+'</div>':'')+'</div>'
    +'<div><div class="detail-section-title">Spesifikasjoner</div><table class="spec-table">'+rows+extra+'</table></div>';
  document.getElementById('detail').classList.add('open');
}

document.getElementById('d-close').onclick=function(){
  document.getElementById('detail').classList.remove('open');
  selectedProduct=null;
};

/* ── INIT ── */
renderSidebar();renderContent();
</script>
